services:
  mongo:
    image: mongo:7
    container_name: cagadas-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Cagadas-BackEnd
    container_name: cagadas-backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/cagadas
      FRONTEND_URLS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./Cagadas-BackEnd:/app
      - /app/node_modules

  frontend:
    build:
      context: ./Cagadas-FrontEnd
    container_name: cagadas-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://localhost:3000
    volumes:
      - ./Cagadas-FrontEnd:/app
      - /app/node_modules

volumes:
  mongo_data:
